<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E-Sertifikat @zuwlend</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: sans-serif; }
    .card-mobile { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 400px; padding: 30px 20px; text-align: center; border: none; }
    .form-control-lg { border-radius: 12px; border: 2px solid #eee; font-size: 16px; }
    .btn-primary { background-color: #007bff; border: none; border-radius: 12px; padding: 15px; font-weight: 700; width: 100%; }
    .spinner-custom { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .footer-text { font-size: 0.7rem; color: #888; margin-top: 25px; }
  </style>
</head>
<body>

<div class="container d-flex justify-content-center">
  <div class="card-mobile">
    <h4 class="fw-bold mb-1">E-Sertifikat</h4>
    <p class="text-muted small mb-4">Workshop BAPPELITBANGDA Prov. Sulsel</p>

    <div class="text-start mb-4">
      <label class="small fw-bold mb-2 text-secondary">NAMA LENGKAP</label>
      <input type="text" id="namaInput" class="form-control form-control-lg" placeholder="Ketik nama Anda..." autocomplete="off">
    </div>

    <button onclick="cari()" id="btnCari" class="btn btn-primary shadow-sm">CEK SERTIFIKAT</button>

    <div id="hasil" class="mt-4"></div>

    <div class="footer-text">
      Digital Certificate System v2.0<br>
      Hosted on GitHub | Created by <b>@zuwlend</b>
    </div>
  </div>
</div>

<script>
  async function cari() {
    const hasilDiv = document.getElementById('hasil');
    const namaInput = document.getElementById('namaInput').value;
    const btn = document.getElementById('btnCari');
    
    // GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE ANDA (YANG BARU DI DEPLOY)
    const webAppUrl = "https://script.google.com/macros/s/AKfycbxBvpgTbz2O1-XOOjN_dIiEMzpL3QC28Q8xnQ8n1-KD6a3dS-brh5FuVer5_r0stuRT/exec";

    if (!namaInput.trim()) {
      hasilDiv.innerHTML = '<div class="alert alert-warning py-2 small">Masukkan nama terlebih dahulu!</div>';
      return;
    }

    // Tampilan Loading
    hasilDiv.innerHTML = '<div class="spinner-custom"></div>';
    btn.disabled = true;

    try {
      // Memanggil API Google Apps Script
      const response = await fetch(`${webAppUrl}?nama=${encodeURIComponent(namaInput)}`);
      const res = await response.json();

      if (res.status === "ditemukan") {
        hasilDiv.innerHTML = `
          <div class="p-3 bg-light rounded-3 border mb-3 text-center">
            <p class="text-success small fw-bold mb-2">✓ Berhasil ditemukan</p>
            <a href="${res.url}" target="_blank" class="btn btn-success w-100 fw-bold">DOWNLOAD PDF</a>
          </div>`;
      } else {
        hasilDiv.innerHTML = '<div class="alert alert-danger py-2 small">Nama tidak ditemukan. Periksa ejaan Anda.</div>';
      }
    } catch (error) {
      hasilDiv.innerHTML = '<div class="alert alert-danger py-2 small">Terjadi kesalahan koneksi.</div>';
      console.error(error);
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
